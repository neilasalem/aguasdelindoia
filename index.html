<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formação Multiplica - Águas de Lindóia | 1ª Edição 2026</title>

  <style>
    :root {
      --bg: #0b0f19;
      --card: rgba(20, 25, 40, 0.8);
      --text: #e5e9f0;
      --muted: #9aa4b2;
      --accent: #3b82f6;
      --overlay: rgba(5, 8, 15, 0.95);
      --shadow: 0 10px 30px rgba(0,0,0,.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      padding: 16px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .hero {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .titulo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitulo {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .botao {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
    }

    .botao:hover {
      background: #2563eb;
    }

    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .galeria {
      column-count: 4;
      column-gap: 12px;
    }

    .item {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      background: #111827;
      box-shadow: var(--shadow);
      transition: transform .2s;
    }

    .item:hover {
      transform: scale(1.02);
    }

    .item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* LIGHTBOX */

    .lightbox {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .lightbox.ativo {
      display: flex;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 85vh;
      border-radius: 10px;
    }

    .controle {
      position: absolute;
      background: rgba(255,255,255,.1);
      color: white;
      border: none;
      font-size: 26px;
      cursor: pointer;
      border-radius: 50%;
      width: 45px;
      height: 45px;
    }

    .fechar {
      top: 20px;
      right: 20px;
    }

    .anterior {
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .proximo {
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .contador {
      position: absolute;
      bottom: 20px;
      color: white;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .galeria { column-count: 3; }
    }

    @media (max-width: 600px) {
      .galeria { column-count: 2; }
    }

    @media (max-width: 400px) {
      .galeria { column-count: 1; }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="hero">
    <div class="titulo">Formação Multiplica – Águas de Lindóia</div>
    <div class="subtitulo">
      1ª Edição 2026 • Registros do encontro com momentos de aprendizagem, troca de experiências e construção coletiva.
    </div>

    <a class="botao"
      href="https://sites.google.com/prof.educacao.sp.gov.br/multiplica2026/in%C3%ADcio"
      target="_top">
      ← Voltar ao site
    </a>

    <div class="meta" id="totalFotos"></div>
  </div>

  <div class="galeria" id="galeria"></div>

</div>

<div class="lightbox" id="lightbox">
  <button class="controle fechar" onclick="fechar()">×</button>
  <button class="controle anterior" onclick="anterior()">‹</button>
  <img id="imgAtual">
  <button class="controle proximo" onclick="proxima()">›</button>
  <div class="contador" id="contador"></div>
</div>

<script>

const fotos = [
"https://lh3.googleusercontent.com/d/11YDdlmdhJBjI-njgj30UQ0U0ZYkoE31W",
"https://lh3.googleusercontent.com/d/151qwPwGBMrJlI6_BViV5EqS_O1jyRAJ7",
"https://lh3.googleusercontent.com/d/15DEuhyZ_Jj0eX_6IRy-mAtoSsunWiZCq",
"https://lh3.googleusercontent.com/d/15l9ogBXrecHUdWHaLVzS9CDSx3-oMRta",
"https://lh3.googleusercontent.com/d/16vsBsABAKO1ZaOHwMkU8uWjMRDC4dCC2",
"https://lh3.googleusercontent.com/d/18gEtmYhmPA7T2oufsiM-uKl5jHMCg6xd",
"https://lh3.googleusercontent.com/d/1DrNi8hmEDE-sV9AlWD1jI1HLIvb4Yq8g",
"https://lh3.googleusercontent.com/d/1F5dOu1lJligAiKn4Ve3Uk544q-gFJFkZ",
"https://lh3.googleusercontent.com/d/1IbYJzh55oRgfmaSfMX-msnSudBSjbZYn",
"https://lh3.googleusercontent.com/d/1JHLY-eAnGOuecFSA5WPj7Dge6LzsTL64",
"https://lh3.googleusercontent.com/d/1K2DCQ-QMmXuUdLt0FPwsFF64VX9MNgwh",
"https://lh3.googleusercontent.com/d/1Q-Re-_iDt3Gm7vjO97qEIpWEacr50pCc",
"https://lh3.googleusercontent.com/d/1fXBBv-NccJHR4aAUzIw5ovJr9ujXhy-y",
"https://lh3.googleusercontent.com/d/1jbqy2yaRsLoNwhXkao5g1IeXAWBPhQuC",
"https://lh3.googleusercontent.com/d/1l744OejAkTMfVjFU-a6Bf1Rb1Z7kmIFb",
"https://lh3.googleusercontent.com/d/1lnPZ8yajaZ3BGvACgkRwPvD2aVHidU6I",
"https://lh3.googleusercontent.com/d/1rxwS5pD0bo65PTeC4EN1XXmyhrlQq2Kg",
"https://lh3.googleusercontent.com/d/1v52qkYwQubI8yVtJZOouj-AoWatFsg-z",
"https://lh3.googleusercontent.com/d/1vFpNvcT0cVX9F25MEnIlWrLtSd6x6ivS",
"https://lh3.googleusercontent.com/d/1wmKzjVn5ydI0N3sQz_sZCm8ynZYMpRrr",
"https://lh3.googleusercontent.com/d/1z4-wL-iKG2yKYfv0ceQru58dfzUdGjed"
];

const galeria = document.getElementById("galeria");
const lightbox = document.getElementById("lightbox");
const imgAtual = document.getElementById("imgAtual");
const contador = document.getElementById("contador");

let index = 0;

document.getElementById("totalFotos").innerText = fotos.length + " registros";

function render() {
  galeria.innerHTML = fotos.map((f,i)=>`
    <div class="item" onclick="abrir(${i})">
      <img src="${f}" loading="lazy">
    </div>
  `).join("");
}

function abrir(i){
  index = i;
  imgAtual.src = fotos[index];
  lightbox.classList.add("ativo");
  atualizarContador();
}

function fechar(){
  lightbox.classList.remove("ativo");
}

function proxima(){
  index = (index+1)%fotos.length;
  imgAtual.src = fotos[index];
  atualizarContador();
}

function anterior(){
  index = (index-1+fotos.length)%fotos.length;
  imgAtual.src = fotos[index];
  atualizarContador();
}

function atualizarContador(){
  contador.innerText = (index+1) + " / " + fotos.length;
}

document.addEventListener("keydown",(e)=>{
  if(!lightbox.classList.contains("ativo")) return;
  if(e.key==="Escape") fechar();
  if(e.key==="ArrowRight") proxima();
  if(e.key==="ArrowLeft") anterior();
});

render();

</script>

</body>
</html>
